<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TimeToRisk</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>

  <div id="bg-emojis" aria-hidden="true"></div>

  <!-- ═══════════════════ JOIN SCREEN ═══════════════════ -->
  <div id="join-screen">
    <div class="join-card">
      <div class="join-logo">TimeToRisk</div>
      <p class="join-sub">Das ultimative Quiz-Erlebnis</p>

      <input type="text" id="player-name" placeholder="Dein Name"
             maxlength="24" autocomplete="off" spellcheck="false">

      <label class="host-label">
        <span class="toggle-wrap">
          <input type="checkbox" id="is-host">
          <span class="toggle-track"></span>
        </span>
        <span>Ich bin der Host</span>
      </label>

      <button class="join-btn" onclick="joinGame()">
        Beitreten <span class="join-arrow">→</span>
      </button>

      <div id="join-players"></div>
    </div>
  </div>

  <!-- ═══════════════════ GAME SCREEN ═══════════════════ -->
  <div id="game-screen">

    <header id="header">
      <div class="game-wordmark">TimeToRisk</div>
      <div id="turn-indicator">Warte auf Spieler…</div>
    </header>

    <div id="score-bar"></div>

    <div id="board"></div>

  </div>

  <!-- Host-only fixed buttons (outside game-screen to guarantee fixed positioning) -->
  <div id="host-buttons">
    <button onclick="openPointsModal()">◈ Punkte verteilen</button>
    <button onclick="resetGame()">↺ Spiel zurücksetzen</button>
  </div>

  <!-- ═══════════════════ QUESTION MODAL ═══════════════════ -->
  <div id="question-modal">
    <div class="modal-card">
      <div class="modal-meta">
        <span id="modal-category"></span>
        <span class="modal-sep">·</span>
        <span id="modal-points"></span>
      </div>
      <div id="modal-question"></div>
      <div id="modal-answer"></div>
      <div id="modal-info">
        <div id="modal-answerer"></div>
        <div id="modal-status"></div>
      </div>
      <div id="host-controls">
        <button id="btn-correct" class="btn-correct" onclick="answerCorrect()">
          <span class="btn-icon">✓</span> Korrekt
        </button>
        <button id="btn-wrong" class="btn-wrong" onclick="answerWrong()">
          <span class="btn-icon">✗</span> Falsch
        </button>
        <button id="btn-close" class="btn-close" onclick="closeQuestion()">
          <span class="btn-icon">✕</span> Schließen
        </button>
      </div>
      <button id="buzzer-btn" onclick="buzz()">BUZZ!</button>
    </div>
  </div>

  <!-- ═══════════════════ POINTS MODAL (host only) ═══════════════════ -->
  <div id="points-modal">
    <div class="modal-card pm-card">

      <button class="pm-close-btn" onclick="closePointsModal()">✕</button>

      <!-- Step 1: pick player -->
      <div id="pm-step-1">
        <div class="pm-heading">Punkte verteilen</div>
        <div class="pm-hint">Spieler auswählen</div>
        <div id="pm-player-list"></div>
      </div>

      <!-- Step 2: enter amount -->
      <div id="pm-step-2">
        <div class="pm-heading">Punkte verteilen</div>
        <div id="pm-chosen-player"></div>
        <div class="pm-mode-row">
          <button id="pm-btn-add" class="pm-mode-btn" onclick="setPmMode('add')">+ Hinzufügen</button>
          <button id="pm-btn-sub" class="pm-mode-btn" onclick="setPmMode('sub')">− Abziehen</button>
        </div>
        <input type="number" id="pm-input" min="0" placeholder="Punkte eingeben…" autocomplete="off">
        <div class="pm-actions">
          <button class="btn-close" onclick="pmBack()">← Zurück</button>
          <button class="btn-correct" onclick="pmSave()">✓ Speichern</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
